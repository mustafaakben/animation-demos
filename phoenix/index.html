<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#151a30">
<title>The Phoenix Brief — Elon University · AI & Critical Thinking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Karla:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#232946; --deep:#151a30; --chalk:#f4f4f0; --amber:#eebb4d;
  --maroon:#73000A; --verdigris:#7ebdb4; --alarm:#c25048; --paper:#f2efe6;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overscroll-behavior:none}
body{background:var(--deep);color:var(--chalk);font-family:'Karla',sans-serif;overflow:hidden;
  -webkit-user-select:none;user-select:none;touch-action:manipulation}

/* ---------- stage ---------- */
#stage{position:fixed;inset:0;overflow:hidden}
#bg,#bg2{position:absolute;inset:-4%;width:108%;height:108%;object-fit:cover;transition:opacity 1s ease}
#bg2{opacity:0}
.kenburns{animation:kb 40s ease-in-out infinite alternate}
@keyframes kb{from{transform:scale(1) translate(0,0)}to{transform:scale(1.06) translate(-1.5%,1%)}}
@media (prefers-reduced-motion: reduce){.kenburns{animation:none}}
#shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,13,28,.35) 0%,rgba(10,13,28,0) 30%,rgba(10,13,28,.05) 55%,rgba(10,13,28,.88) 100%)}

/* ---------- hud ---------- */
#hud{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:10px;
  padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;color:#c9cde0;
  background:linear-gradient(180deg,rgba(10,13,28,.75),transparent)}
#hud .grow{flex:1}
#hud b{color:var(--amber);font-weight:500}
.hudbtn{background:rgba(21,26,48,.85);border:1px solid #3c4468;color:#c9cde0;border-radius:8px;
  padding:8px 12px;font-family:inherit;font-size:11px;letter-spacing:.1em;cursor:pointer}
.hudbtn:hover{border-color:var(--amber);color:var(--chalk)}
.hudbtn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
#evBtn.has{border-color:var(--amber);color:var(--amber)}
@media (max-width:520px){
  #hud{gap:8px;padding:calc(8px + env(safe-area-inset-top)) 10px 8px;font-size:10px}
  #sceneTitle{display:none}
  .hudbtn{padding:7px 9px;font-size:10px}
}

/* ---------- dialogue ---------- */
#dlg{position:fixed;left:0;right:0;bottom:0;z-index:15;padding:0 14px calc(16px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:none}
#dlgCard{width:min(96vw,680px);background:rgba(16,20,42,.94);border:1px solid #3c4468;border-radius:16px;
  padding:16px 18px 14px;pointer-events:auto;cursor:pointer;backdrop-filter:blur(6px)}
#speaker{display:flex;align-items:center;gap:12px;margin-bottom:8px}
#speaker img{width:56px;height:56px;border-radius:12px;object-fit:cover;border:2px solid var(--amber);background:var(--ink)}
#speaker .who{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;color:var(--amber)}
#speaker .role{font-size:11px;color:#9ba1c0;margin-top:2px}
#lineText{font-size:16.5px;line-height:1.6;color:var(--chalk)}
#lineText.narr{font-style:italic;color:#c9cde0}
#tapHint{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:#6d7392;text-align:right;margin-top:8px}
#audioCtl{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.actl{pointer-events:auto;background:none;border:1px solid #3c4468;color:#9ba1c0;border-radius:999px;
  width:38px;height:38px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.actl:hover{border-color:var(--amber);color:var(--amber)}

/* ---------- choices ---------- */
#choices{width:min(96vw,680px);display:none;flex-direction:column;gap:10px;pointer-events:auto;
  max-height:82dvh;overflow-y:auto;overscroll-behavior:contain}
#choicePrompt{font-family:'Fraunces',serif;font-weight:600;font-size:19px;color:var(--chalk);
  background:rgba(16,20,42,.94);border:1px solid var(--amber);border-radius:14px;padding:14px 18px}

/* inline evidence panel — compact open list above the question */
#evPanel{width:100%;background:rgba(16,20,42,.94);border:1px solid #3c4468;border-radius:14px;padding:12px 13px;display:none}
#evPanel .eph{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:#9ba1c0;
  margin-bottom:9px;display:flex;align-items:center;gap:6px}
#evPanel .eph b{color:var(--amber);font-weight:500}
.evrow{display:flex;align-items:center;gap:10px;width:100%;background:rgba(15,19,48,.75);border:1px solid #2b3357;
  border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;text-align:left;color:var(--chalk)}
.evrow:last-child{margin-bottom:0}
.evrow:hover{border-color:var(--amber)}
.evrow:focus-visible{outline:2px solid var(--amber);outline-offset:1px}
.evrow .ic{font-size:18px;flex-shrink:0}
.evrow .nm{flex:1;font-size:13px;font-weight:600;line-height:1.3}
.evrow .new{background:var(--amber);color:var(--ink);border-radius:4px;padding:1px 6px;
  font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.06em;flex-shrink:0}
.evrow .arw{color:#6d7392;font-size:13px;flex-shrink:0}
.evrow.seen{opacity:.62}
.evrow.seen .nm{font-weight:400}
.opt{background:rgba(244,244,240,.97);color:var(--ink);border:none;border-radius:14px;padding:16px 18px;
  font-family:'Karla',sans-serif;font-size:15px;font-weight:600;text-align:left;cursor:pointer;line-height:1.45}
.opt:hover{background:var(--amber)}
.opt:focus-visible{outline:3px solid var(--amber);outline-offset:2px}
.opt .t{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;
  color:#8d6a33;margin-top:5px;font-weight:400}

/* ---------- sheets (evidence / title / debrief) ---------- */
.backdrop{position:fixed;inset:0;z-index:40;background:rgba(8,10,22,.7);display:none;
  align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.backdrop.open{display:flex}
@media(min-width:700px){.backdrop{align-items:center}}
.sheet{width:min(96vw,640px);max-height:88dvh;display:flex;flex-direction:column;background:var(--paper);
  color:#232324;border-radius:16px 16px 0 0;overflow:hidden;box-shadow:0 -20px 60px rgba(0,0,0,.6)}
@media(min-width:700px){.sheet{border-radius:16px}}
.sheet.dark{background:#141a33;color:var(--chalk)}
.sh-head{padding:16px 22px 12px;border-bottom:1px solid rgba(35,41,70,.18)}
.sheet.dark .sh-head{border-bottom-color:#2b3357}
.sh-kind{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.2em;color:#8d6a33}
.sheet.dark .sh-kind{color:var(--amber)}
.sh-title{font-family:'Fraunces',serif;font-weight:600;font-size:20px;margin-top:3px}
.sh-sub{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#6d6d75;margin-top:3px}
.sheet.dark .sh-sub{color:#9ba1c0}
.sh-body{padding:18px 22px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;font-size:14.5px;line-height:1.65;white-space:pre-wrap}
.sh-body.mono{font-family:'IBM Plex Mono',monospace;font-size:12.5px;line-height:1.7;background:#ece7d8}
.sh-foot{display:flex;gap:10px;padding:12px 16px calc(12px + env(safe-area-inset-bottom));border-top:1px solid rgba(35,41,70,.18)}
.sheet.dark .sh-foot{border-top-color:#2b3357}
.sbtn{flex:1;border:none;border-radius:12px;padding:15px 8px;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.12em;font-weight:500}
.sbtn.amber{background:var(--amber);color:var(--ink)}
.sbtn.amber:hover{background:#f6cc6d}
.sbtn.ghost{background:none;border:1.5px solid #a9a396;color:#6d6d75}
.sheet.dark .sbtn.ghost{border-color:#3c4468;color:#9ba1c0}
.sbtn.ghost:hover{border-color:var(--amber);color:var(--amber)}

/* evidence grid */
#evGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 18px}
.evItem{background:#0f1330;border:1px solid #3c4468;border-radius:12px;padding:14px;cursor:pointer;text-align:left}
.evItem:hover{border-color:var(--amber)}
.evItem .ic{font-size:22px}
.evItem .tt{font-weight:700;font-size:13px;margin-top:6px;color:var(--chalk)}
.evItem .st{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.08em;color:#9ba1c0;margin-top:3px}
.evItem.seen{border-style:dashed;opacity:.8}

/* image evidence + hotspots */
#imgWrap{position:relative;overflow:auto;background:#0a0d1c;flex:1;min-height:44vh}
#imgWrap img{width:100%;display:block}
.hs{position:absolute;width:44px;height:44px;margin:-22px;border-radius:50%;border:2.5px solid var(--amber);
  background:rgba(238,187,77,.18);cursor:pointer;animation:hspulse 1.8s ease infinite}
.hs.found{border-color:var(--verdigris);background:rgba(126,189,180,.25);animation:none}
@keyframes hspulse{0%,100%{box-shadow:0 0 0 0 rgba(238,187,77,.5)}60%{box-shadow:0 0 0 12px rgba(238,187,77,0)}}
@media (prefers-reduced-motion: reduce){.hs{animation:none}}
#hsNote{padding:12px 18px;background:#20263f;color:#e6d9b8;font-size:13.5px;line-height:1.55;min-height:52px}

/* title & debrief internals */
.t-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.26em;color:var(--amber)}
.t-title{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(34px,8vw,50px);line-height:1.04;margin:10px 0 6px}
.t-sub{font-size:14px;color:#b9bdd0;margin-bottom:16px;line-height:1.5}
.t-fiction p{margin-bottom:11px;color:#d8dae6;font-size:15px;line-height:1.6}
.bigbtn{width:100%;margin-top:10px;background:var(--amber);color:var(--ink);border:none;border-radius:999px;
  padding:17px;font-family:'IBM Plex Mono',monospace;font-size:13.5px;letter-spacing:.16em;font-weight:500;cursor:pointer}
.bigbtn:hover{background:#f6cc6d}
.bigbtn.quiet{background:none;border:1.5px solid #3c4468;color:#9ba1c0}
.bigbtn.quiet:hover{border-color:var(--chalk);color:var(--chalk)}
.r-rank{border:1px solid var(--amber);border-radius:12px;padding:16px;margin:14px 0}
.r-rank .name{font-family:'IBM Plex Mono',monospace;letter-spacing:.18em;color:var(--amber);font-size:12.5px}
.r-rank .text{margin-top:6px;color:#d8dae6;font-size:14px;line-height:1.55}
.cap{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px dashed #2b3357}
.cap .cn{font-weight:700;font-size:14px}
.cap .cd{font-size:12px;color:#9ba1c0;margin-top:2px;line-height:1.4}
.dots{font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--amber);letter-spacing:2px;white-space:nowrap}
.cf{border-left:3px solid var(--alarm);background:#1b2140;padding:11px 14px;border-radius:8px;margin:9px 0;font-size:13px;line-height:1.55}
.cf.good{border-left-color:var(--verdigris)}
.code{font-family:'IBM Plex Mono',monospace;background:#0a0d1c;border:1px dashed var(--amber);color:var(--amber);
  border-radius:10px;padding:14px;text-align:center;font-size:17px;letter-spacing:.2em;margin:14px 0 4px}
h4.rh{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.2em;color:#9ba1c0;margin:18px 0 6px;font-weight:400}
.r-close{margin-top:14px;color:#b9bdd0;font-size:13.5px;line-height:1.6;font-style:italic}
.r-course{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--amber);margin-top:8px}

/* ---------- radiating evidence button ---------- */
#evBtn{position:relative}
#evBtn.radiate{border-color:var(--amber);color:var(--amber);animation:evpulse 1.6s ease infinite}
@keyframes evpulse{0%,100%{box-shadow:0 0 0 0 rgba(238,187,77,.0)}50%{box-shadow:0 0 0 7px rgba(238,187,77,.22)}}
@media (prefers-reduced-motion: reduce){#evBtn.radiate{animation:none;box-shadow:0 0 0 2px rgba(238,187,77,.4)}}
#evNew{position:absolute;top:-7px;right:-7px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;
  background:var(--amber);color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;
  display:none;align-items:center;justify-content:center;line-height:18px}
#evNew.show{display:flex}
.evItem .newtag{display:inline-block;margin-left:6px;background:var(--amber);color:var(--ink);border-radius:4px;
  padding:1px 5px;font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.08em;vertical-align:middle}

/* ---------- scene video layer ---------- */
#videoLayer{position:fixed;inset:0;z-index:12;display:none;background:#0a0d1c}
#videoLayer.show{display:block}
/* blurred scene-art fills the screen; the 16:9 video sits inside via contain (never cropped) */
#vidBackdrop{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(30px) brightness(.42);transform:scale(1.2)}
#sceneVid{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:transparent}
#vidPoster{position:absolute;inset:0;background-size:contain;background-repeat:no-repeat;background-position:center;display:none}
#vidPoster.show{display:block}
#vidCtl{position:absolute;right:14px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:13;display:flex;gap:8px}
.vbtn{background:rgba(10,13,28,.8);border:1px solid #3c4468;color:#c9cde0;border-radius:999px;height:44px;padding:0 16px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;cursor:pointer;display:flex;align-items:center;gap:6px}
.vbtn:hover{border-color:var(--amber);color:var(--amber)}
.vbtn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
#vidTapPlay{position:absolute;inset:0;z-index:14;display:none;align-items:center;justify-content:center;
  background:rgba(8,10,22,.5);cursor:pointer}
#vidTapPlay.show{display:flex}
#vidTapPlay .big{width:88px;height:88px;border-radius:50%;background:var(--amber);color:var(--ink);
  display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 10px 40px rgba(238,187,77,.4)}

/* ---------- evidence invitation pane ---------- */
#invite{position:fixed;left:0;right:0;bottom:0;z-index:16;padding:0 14px calc(18px + env(safe-area-inset-bottom));
  display:none;justify-content:center;pointer-events:none}
#invite.show{display:flex}
#inviteCard{width:min(96vw,560px);background:rgba(16,20,42,.96);border:1px solid var(--amber);border-radius:18px;
  padding:20px;pointer-events:auto;transform:translateY(30px);opacity:0;animation:inviteRise .5s cubic-bezier(.2,1,.4,1) forwards;
  box-shadow:0 24px 60px rgba(0,0,0,.5)}
@keyframes inviteRise{to{transform:translateY(0);opacity:1}}
@media (prefers-reduced-motion: reduce){#inviteCard{animation:none;transform:none;opacity:1}}
#inviteCard .ic{font-size:26px;margin-bottom:6px}
#inviteCard h3{font-family:'Fraunces',serif;font-weight:600;font-size:20px;margin-bottom:6px;color:var(--chalk)}
#inviteCard p{font-size:14px;color:#b9bdd0;line-height:1.5;margin-bottom:16px}
#inviteCard .row{display:flex;gap:10px}
#inviteCard button{flex:1;border:none;border-radius:12px;padding:15px 10px;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;font-weight:500}
#inviteReview{background:var(--amber);color:var(--ink)}
#inviteReview:hover{background:#f6cc6d}
#inviteReady{background:none;border:1.5px solid #3c4468 !important;color:#9ba1c0}
#inviteReady:hover{border-color:var(--chalk) !important;color:var(--chalk)}

/* ---------- rich evidence renderers ---------- */
.sh-body.rich{white-space:normal;padding:0}
.ev{padding:18px 20px}
.ev-note{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8d6a33;letter-spacing:.06em;margin-top:14px;line-height:1.5}

/* webmail */
.mail{background:#fbfaf6}
.mail-bar{display:flex;align-items:center;gap:8px;padding:12px 18px;background:var(--maroon);color:#f7e9c9}
.mail-bar .logo{font-family:'Fraunces',serif;font-weight:600;font-size:15px;letter-spacing:.02em}
.mail-bar .grow{flex:1}
.mail-bar .chip{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.1em;opacity:.8}
.mail-ext{background:#f7dcd8;color:#8f2f28;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.04em;
  padding:9px 18px;border-bottom:1px solid #e7b6b0;display:flex;gap:8px;align-items:center}
.mail-head{display:flex;align-items:center;gap:12px;padding:16px 18px 10px}
.mail-av{width:44px;height:44px;border-radius:50%;color:#fff;font-family:'IBM Plex Mono',monospace;font-weight:600;
  font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mail-fromname{font-weight:700;font-size:15px;color:#232324}
.mail-addr{margin-top:2px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#6d6d75;background:none;border:none;
  cursor:pointer;padding:0;text-align:left}
.mail-addr .revealbtn{color:var(--maroon);text-decoration:underline;font-size:11px}
.mail-addr .dom{color:#c0392b;font-weight:600}
.mail-addr .dom.ok{color:#3f7a3f}
.mail-time{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#9a9a9f;align-self:flex-start}
.mail-subj{padding:2px 18px 12px;font-family:'Fraunces',serif;font-weight:600;font-size:19px;color:#232324}
.mail-body{padding:4px 18px 16px;font-size:14.5px;line-height:1.62;color:#3a3a40}
.mail-body p{margin-bottom:11px}
.mail-sig{padding:0 18px 20px;font-size:13.5px;line-height:1.55;color:#5a5a62;border-top:1px solid #eee;margin-top:4px;padding-top:12px}

/* letterhead doc */
.doc-lh{padding:24px 22px;background:#fdfcf8}
.doc-lh-org{font-family:'Fraunces',serif;font-weight:600;font-size:13px;letter-spacing:.14em;color:var(--maroon);
  border-bottom:2px solid var(--maroon);padding-bottom:8px;display:flex;align-items:center;gap:8px}
.doc-lh-org::before{content:'🔥';font-size:14px}
.doc-lh-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:#8d6a33;margin:14px 0 6px}
.doc-lh-headline{font-family:'Fraunces',serif;font-weight:600;font-size:23px;line-height:1.15;color:#232324;margin-bottom:14px}
.doc-lh p{font-size:14.5px;line-height:1.62;color:#3a3a40;margin-bottom:11px}
.doc-lh-ph{border:1.5px dashed #c9a24a;background:#fbf3df;color:#8d6a33;border-radius:8px;padding:11px 13px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;margin:6px 0 12px}
.doc-lh-footer{font-size:13px;color:#6d6d75;font-style:italic;border-top:1px solid #eadfc6;padding-top:10px}

/* poster */
.poster{padding:20px;background:#f7f5ee}
.poster-title{font-family:'Fraunces',serif;font-weight:600;font-size:19px;line-height:1.2;color:var(--ink);
  border-bottom:3px solid var(--amber);padding-bottom:10px}
.poster-authors{font-size:11.5px;color:#6d6d75;margin:6px 0 14px}
.poster-col{margin-bottom:14px}
.poster-col h5{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--maroon);margin-bottom:5px}
.poster-col p{font-size:13.5px;line-height:1.55;color:#3a3a40}
.poster-funding{font-size:11.5px;color:#8d6a33;font-style:italic;border-top:1px dashed #cfc6ad;padding-top:9px;margin-top:6px}

/* dashboard */
.dash{padding:18px;background:#0f1330}
.dash-app{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--amber);margin-bottom:14px}
.dash-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.dash-cards{grid-template-columns:1fr}}
.dash-card{background:#161b3a;border:1px solid #2b3357;border-radius:12px;padding:14px}
.dash-card .ct{font-size:12.5px;color:#c9cde0;font-weight:600;margin-bottom:8px}
.dash-card .ce{font-family:'IBM Plex Mono',monospace;font-size:11px;margin-top:6px}
.dash-cap{margin-top:14px;font-size:13px;line-height:1.55;color:#b9bdd0;font-style:italic;
  border-left:3px solid var(--amber);padding-left:12px}
.chart-svg{width:100%;height:auto;display:block}

/* chatlog */
.chat{padding:16px 18px;background:#12141c}
.chat-ch{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8a90b8;margin-bottom:14px}
.chat-msg{display:flex;gap:11px;margin-bottom:14px}
.chat-msg.reply{margin-left:26px}
.chat-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;color:#12141c;font-family:'IBM Plex Mono',monospace;
  font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center}
.chat-meta{font-size:12px;color:#c9cde0;margin-bottom:2px}
.chat-meta b{color:#fff;font-weight:600}
.chat-meta .tm{color:#6d7392;font-family:'IBM Plex Mono',monospace;font-size:10px;margin-left:6px}
.chat-text{font-size:14px;line-height:1.5;color:#d8dae6}

/* directory */
.dir{padding:20px}
.dir-card{background:#fff;border:1px solid #e4e0d4;border-radius:12px;padding:18px;color:#232324}
.dir-name{font-family:'Fraunces',serif;font-weight:600;font-size:19px;color:var(--ink)}
.dir-title{font-size:13px;color:#6d6d75;margin:3px 0 12px}
.dir-row{display:flex;gap:9px;align-items:center;font-size:13.5px;color:#3a3a40;padding:5px 0;border-top:1px solid #f0ede3}
.dir-row .k{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#9a9a9f;min-width:74px}
.dir-banner{margin-top:14px;background:#eaf1ea;border:1px solid #cfe0cf;border-radius:10px;padding:12px 14px;
  font-size:12.5px;line-height:1.5;color:#3f6b3f;display:flex;gap:8px}
</style>
</head>
<body>
<div id="stage">
  <img id="bg" alt="" class="kenburns">
  <img id="bg2" alt="">
  <div id="shade"></div>
</div>

<!-- scene video layer -->
<div id="videoLayer">
  <div id="vidBackdrop"></div>
  <video id="sceneVid" playsinline webkit-playsinline preload="auto"></video>
  <div id="vidPoster"></div>
  <div id="vidTapPlay" role="button" aria-label="Play scene"><div class="big">▶</div></div>
  <div id="vidCtl">
    <button class="vbtn" id="vidReplay" aria-label="Replay scene">↻</button>
    <button class="vbtn" id="vidPause" aria-label="Pause">⏸</button>
    <button class="vbtn" id="vidSkip">SKIP ▸</button>
  </div>
</div>


<div id="hud">
  <span>PHOENIX&nbsp;BRIEF&nbsp;·&nbsp;<b id="clock">8:10</b></span>
  <span class="grow"></span>
  <span id="sceneTitle" style="color:#9ba1c0"></span>
  <span class="grow"></span>
  <button class="hudbtn" id="evBtn">🗂 EVIDENCE <b id="evCount">0</b><span id="evNew">0</span></button>
  <button class="hudbtn" id="muteBtn" aria-label="Toggle sound">♪</button>
</div>

<div id="dlg">
  <div id="choices">
    <div id="evPanel"></div>
    <div id="choicePrompt"></div>
    <div id="optWrap" style="display:flex;flex-direction:column;gap:10px"></div>
  </div>
  <div id="dlgCard" role="button" aria-label="Continue">
    <div id="speaker">
      <img id="spImg" alt="" style="display:none">
      <span><span class="who" id="spName"></span><span class="role" id="spRole" style="display:block"></span></span>
    </div>
    <div id="lineText"></div>
    <div style="display:flex;align-items:flex-end;justify-content:space-between">
      <div id="audioCtl">
        <button class="actl" id="btnReplay" aria-label="Replay line">↻</button>
        <button class="actl" id="btnPause" aria-label="Pause or play">⏸</button>
      </div>
      <div id="tapHint">TAP TO CONTINUE ▸</div>
    </div>
  </div>
</div>

<!-- evidence drawer -->
<div class="backdrop" id="drawerBack" role="dialog" aria-modal="true" aria-label="Evidence">
  <div class="sheet dark">
    <div class="sh-head"><div class="sh-kind">CASE MATERIALS</div>
      <div class="sh-title">Evidence on your desk</div>
      <div class="sh-sub">Everything here is fair game. What you open gets remembered.</div></div>
    <div id="evGrid" style="overflow-y:auto"></div>
    <div class="sh-foot"><button class="sbtn ghost" id="drawerClose">BACK TO THE SCENE</button></div>
  </div>
</div>

<!-- document / email sheet -->
<div class="backdrop" id="docBack" role="dialog" aria-modal="true" aria-label="Document">
  <div class="sheet">
    <div class="sh-head"><div class="sh-kind" id="docKind"></div>
      <div class="sh-title" id="docTitle"></div><div class="sh-sub" id="docSub"></div></div>
    <div class="sh-body" id="docBody"></div>
    <div class="sh-foot"><button class="sbtn ghost" id="docClose">PUT IT DOWN</button></div>
  </div>
</div>

<!-- image sheet -->
<div class="backdrop" id="imgBack" role="dialog" aria-modal="true" aria-label="Photo inspection">
  <div class="sheet">
    <div class="sh-head"><div class="sh-kind" id="imgKind">PHOTOGRAPH</div>
      <div class="sh-title" id="imgTitle"></div><div class="sh-sub" id="imgSub"></div></div>
    <div id="imgWrap"><img id="imgEl" alt="Photo under inspection"></div>
    <div id="hsNote">Tap the glowing rings to inspect the marked areas.</div>
    <div class="sh-foot"><button class="sbtn ghost" id="imgClose">PUT IT DOWN</button></div>
  </div>
</div>

<!-- title -->
<div class="backdrop open" id="titleBack" role="dialog" aria-modal="true" aria-label="The Phoenix Brief">
  <div class="sheet dark"><div class="sh-body" id="titleBody" style="white-space:normal"></div></div>
</div>

<!-- debrief -->
<div class="backdrop" id="debriefBack" role="dialog" aria-modal="true" aria-label="Debrief">
  <div class="sheet dark"><div class="sh-body" id="debriefBody" style="white-space:normal"></div></div>
</div>

<!-- intro video -->
<div class="backdrop" id="videoBack" role="dialog" aria-modal="true" aria-label="Briefing video">
  <div class="sheet dark" style="max-width:820px;width:min(96vw,820px)">
    <video id="introVid" src="intro.mp4" controls playsinline preload="metadata"
      style="width:100%;display:block;background:#000;border-radius:16px 16px 0 0"></video>
    <div class="sh-foot"><button class="sbtn ghost" id="videoClose">CLOSE</button></div>
  </div>
</div>

<script type="module" src="engine.js"></script>
</body>
</html>
